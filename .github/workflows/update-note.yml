name: Update note articles
on:
  schedule:
    - cron: '0 */6 * * *' # 6時間ごとに自動実行
  workflow_dispatch: # 手動で実行ボタンを押すことも可能

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # 💡 ここを 20 から 24 に変更しました
      - name: Install dependencies
        run: npm install fast-xml-parser
      - name: Run script
        run: node update-note.js
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update note articles" && git push)
