        function updateList() {
            const selectedRegions = Array.from(document.querySelectorAll('#region-filters input:checked')).map(el => el.value);
            const selectedStatus = Array.from(document.querySelectorAll('#status-filters input:checked')).map(el => el.value);
            filteredClinics = clinics.filter(clinic => {
                return (selectedRegions.length === 0 || selectedRegions.includes(clinic.region)) && (selectedStatus.length === 0 || selectedStatus.includes(clinic.status));
            });
            matchCountEl.textContent = filteredClinics.length; renderClinics();
        }
        function renderClinics() {
            clinicListEl.innerHTML = ''; const slice = filteredClinics.slice(0, displayCount);
            if (slice.length === 0) { clinicListEl.innerHTML = '<p class="text-center py-8">該当なし</p>'; moreBtnContainer.style.display = 'none'; return; }
            slice.forEach((clinic, idx) => {
                const badgeClass = clinic.status === '対応' ? 'bg-emerald-50 text-emerald-700' : 'bg-slate-100 text-slate-600';
                const html = `<div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100"><div class="flex flex-col md:flex-row gap-6"><div class="flex-1"><div class="flex flex-wrap gap-2 mb-3"><span class="px-2 py-1 bg-brand-orange/10 text-brand-orange text-xs font-bold rounded">${clinic.pref}</span><span class="px-2 py-1 text-xs font-bold rounded ${badgeClass}">先進医療B ${clinic.status}</span></div><h2 class="text-xl font-bold text-brand-text mb-2">${clinic.name}</h2><div class="grid grid-cols-2 gap-4 text-sm bg-slate-50 p-4 rounded-lg mt-4"><div><span class="block text-slate-400 text-xs mb-1 font-bold">PGT-A費用目安</span><span class="font-bold text-brand-text">${clinic.cost}</span></div><div><span class="block text-slate-400 text-xs mb-1 font-bold">最寄り駅</span><span class="font-bold text-brand-text">${clinic.station}</span></div></div></div></div><div id="details-${idx}" class="hidden mt-6 pt-6 border-t border-slate-100 bg-slate-50 p-6 rounded-xl space-y-3 text-sm"><h3 class="font-bold text-brand-text text-base border-b pb-2 mb-2">施設詳細承認情報</h3><div class="grid grid-cols-1 sm:grid-cols-2 gap-3"><div><span class="text-slate-400 text-xs block">医療機関名</span><span class="font-bold">${clinic.name}</span></div><div><span class="text-slate-400 text-xs block">承認番号</span><span class="font-mono font-bold">No.${clinic.code || '---'}</span></div><div><span class="text-slate-400 text-xs block">所在地</span><span class="font-bold">${clinic.pref} (${clinic.region})</span></div><div><span class="text-slate-400 text-xs block">最寄り駅</span><span class="font-bold">${clinic.station}</span></div><div><span class="text-slate-400 text-xs block">区分</span><span class="font-bold">${clinic.status === '対応' ? '先進医療B実施施設承認済' : '自費PGT-Aのみ実施'}</span></div><div><span class="text-slate-400 text-xs block">費用目安</span><span class="font-bold text-brand-orange">${clinic.cost}</span></div></div></div><div class="mt-6 pt-4 border-t border-slate-100 flex justify-end gap-4"><button onclick="toggleDetails(${idx})" class="px-6 py-2 border border-brand-orange text-brand-orange rounded-full text-sm font-bold">詳細情報を見る</button></div></div>`;
                clinicListEl.insertAdjacentHTML('beforeend', html);
            });
            moreBtnContainer.style.display = displayCount >= filteredClinics.length ? 'none' : 'block';
        }
        document.querySelectorAll('#region-filters input, #status-filters input').forEach(cb => cb.addEventListener('change', () => { displayCount = 20; updateList(); }));
        loadMoreBtn.addEventListener('click', () => { displayCount += 20; renderClinics(); });
        updateList();
    </script>
</body>
</html>
